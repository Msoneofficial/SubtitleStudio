org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# # Disable Vulkan to prevent black screen issues in release builds
# android.enableVulkan=false

# Workarounds for Kotlin/Gradle incremental cache problems on Windows
# Some Kotlin incremental caches stored under the pub cache (C:\Users\...) can
# end up on a different drive/root than the project (D:\...), causing the
# incremental compiler to fail when closing caches. Disable Kotlin incremental
# compilation and the Kotlin daemon to avoid these errors. This is safe and
# trades incremental compile speed for reliability when building on this setup.
kotlin.incremental=false
kotlin.daemon.enabled=false
# Run the Kotlin compiler in-process for more predictable behavior on CI/Windows
kotlin.compiler.execution.strategy=in-process
